<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
    <link rel="stylesheet" href="style_login.css">
</head>
<body>

    <br>
    <div class="cont">
        
        <form id="loginForm" class="form sign-in">
            <h2>Silahkan Login</h2>
            
            <label for="username">
                <span>Nama Pengguna</span>
                <input type="text" id="username" placeholder="Nama Pengguna .. " required="required">
            </label>
            
            <label for="password">
                <span>Password</span>
                <input type="password" id="password" placeholder="Password .. " required="required">
            </label>
            
            <p class="forgot-pass">Forgot password?</p>
            
            <button type="submit" class="submit">masuk</button>
            
            <button type="button" onclick="location.href='../index.html';" class="submit" style="background: #777; margin-top: -10px;">Home</button>
            
            <div id="alertBox" class="alert" style="display:none; color: red; margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px;"></div>
        </form>

        <div class="sub-cont">
            <div class="img">
                <div class="img__text m--up">
                    <h3>Don't have an account? Please Sign up!</h3>
                </div>
                <div class="img__text m--in">
                    <h3>If you already have an account, just sign in.</h3>
                </div>
                <div class="img__btn">
                    <span class="m--up">Sign Up</span>
                    <span class="m--in">Sign In</span>
                </div>
            </div>
            
            <form id="registerForm" class="form sign-up">
                <h2>Create your Account</h2>
                <label for="regUsername">
                    <span>Name</span>
                    <input type="text" id="regUsername" placeholder="Username baru..." required="required" />
                </label>
                <label for="regEmail">
                    <span>Email</span>
                    <input type="email" id="regEmail" placeholder="Email kamu..." />
                </label>
                <label for="regPassword">
                    <span>Password</span>
                    <input type="password" id="regPassword" placeholder="Password baru..." required="required" />
                </label>
                
                <button type="submit" class="submit">Sign Up</button>

                <div id="regAlertBox" class="alert" style="display:none; color: red; margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px;"></div>
            </form>
        </div>
    </div>

    <script>
        document.querySelector('.img__btn').addEventListener('click', function() {
            document.querySelector('.cont').classList.toggle('s--signup');
        });
    </script>

    <script src="login.js"></script>
</body>
</html>
